name: MLB Dashboard Engine

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

concurrency:
  group: live-mlb-dashboard
  cancel-in-progress: true

jobs:
  run-engine:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install groq

      - name: Run MLB engine
        run: python run_engine_fixed.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add daily.json || true
          git add live.json || true
          git add postgame.json || true
          git add yesterday_postgame.json || true
          git add yesterday_recap.json || true

          git commit -m "Update MLB dashboard data" || echo "No changes"
          git push
