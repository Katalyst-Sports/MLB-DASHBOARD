name: MLB Dashboard Engine

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    # Runs every minute
    - cron: "* * * * *"

jobs:
  run-engine:
    runs-on: ubuntu-latest

    # ✅ Explicitly inject the Groq API key into the runtime
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    # ✅ Prevent overlapping runs
    concurrency:
      group: live-mlb-dashboard
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install groq

      - name: Run MLB engine
        run: python run_engine.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Add files only if they exist
          git add daily.json live.json postgame.json || true
          git add daily_recap.json || true

          git commit -m "Update MLB dashboard data" || echo "No changes"
          git push
