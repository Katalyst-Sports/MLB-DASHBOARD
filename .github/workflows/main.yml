name: MLB Context Engine (Hourly)

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python run_engine.py
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add daily.json
          git commit -m "Hourly MLB update" || echo "No change"
          git push
