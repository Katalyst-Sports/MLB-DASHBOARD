name: MLB Dashboard Engine

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

jobs:
  run-engine:
    runs-on: ubuntu-latest
    concurrency:
      group: live-mlb
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python run_engine.py

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily.json live.json
          git commit -m "Update MLB dashboard data" || echo "No changes"
          git push
