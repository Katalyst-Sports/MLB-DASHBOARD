name: Run MLB Engine Daily

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 10 * * *"
    - cron: "0 14 * * *"
    - cron: "0 18 * * *"

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python run_engine.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily.json
          git commit -m "Daily MLB update" || echo "No changes"
          git push
