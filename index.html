<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MLB Lineup Context</title>
<style>
.card{background:#fff;padding:16px;margin-bottom:12px;border-radius:12px}
.meta{font-size:14px;color:#444}
.badge{padding:2px 6px;border-radius:6px;font-size:12px}
.official{background:#16a34a;color:#fff}
.projected{background:#fbbf24}
</style>
</head>
<body>

<h1>MLB Game Context — Lineups (≤3h to Start)</h1>
<div id="content"></div>

<script>
fetch("/MLB-DASHBOARD/daily.json?"+Date.now())
.then(r=>r.json())
.then(d=>{
  const c=document.getElementById("content");
  d.games.forEach(g=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <strong>${g.away} @ ${g.home}</strong><br>
      <div class="meta">
        Away SP: ${g.away_pitcher}<br>
        Lineup (${g.away_lineup.type}):
        <span class="badge ${g.away_lineup.type}">
          ${g.away_lineup.type}
        </span><br>
        ${g.away_lineup.hitters.join(", ")}<br><br>

        Home SP: ${g.home_pitcher}<br>
        Lineup (${g.home_lineup.type}):
        <span class="badge ${g.home_lineup.type}">
          ${g.home_lineup.type}
        </span><br>
        ${g.home_lineup.hitters.join(", ")}
      </div>
    `;
    c.appendChild(card);
  });
});
</script>

</body>
</html>
