<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MLB Performance Context</title>
<style>
body{font-family:system-ui;background:#f6f7f9;padding:24px;max-width:1200px;margin:auto}
.card{background:white;padding:16px;border-radius:12px;margin-bottom:16px}
.meta{font-size:14px;color:#444}
.section{font-weight:600;margin-top:10px}
.hot{color:#dc2626;font-weight:700}
.top{color:#059669;font-weight:700}
.mid{color:#2563eb;font-weight:700}
.bot{color:#6b7280;font-weight:700}
</style>
</head>
<body>

<h1>MLB Performance Context</h1>
<p style="color:#555;font-size:14px;">Contact‑first hitters, batting‑order tiers, pitcher quality, and situational hitting.</p>

<div id="daily"></div>

<script>
fetch("/MLB-DASHBOARD/daily.json?"+Date.now())
.then(r=>r.json())
.then(d=>{
  const c=document.getElementById("daily");
  d.games.forEach(g=>{
    const card=document.createElement("div");
    card.className="card";

    function tier(t){
      if(t==="Top‑Order") return "<span class='top'>Top‑Order</span>";
      if(t==="Middle‑Order") return "<span class='mid'>Middle‑Order</span>";
      return "<span class='bot'>Bottom‑Order</span>";
    }

    card.innerHTML=`
<strong>${g.away_team} @ ${g.home_team}</strong><br>
<div class="meta">
Venue: ${g.venue}<br>
Start: ${new Date(g.start).toLocaleString()}<br>

<div class="section">Starting Pitchers</div>
${g.away_pitcher.name} (${g.away_pitcher.hand}) — ERA ${g.away_pitcher.era}
${g.away_pitcher.elite?" 🔵 Elite":g.away_pitcher.quality?" ✅ Quality":""}<br>
${g.home_pitcher.name} (${g.home_pitcher.hand}) — ERA ${g.home_pitcher.era}
${g.home_pitcher.elite?" 🔵 Elite":g.home_pitcher.quality?" ✅ Quality":""}<br>

<div class="section">${g.away_team} Hitters</div>
${g.away_hitters.map(h=>`
<div>
${h.name} ${tier(h.tier)}
${h.streak>=3?` <span class='hot'>🔥 ${h.streak}‑game streak</span>`:""}<br>
AVG ${h.stats.avg} | K% ${h.stats.k_rate} | BB% ${h.stats.bb_rate} | BIP/PA ${h.stats.bip_pa}<br>
RISP AVG ${h.risp.avg}
</div>
`).join("")}

<div class="section">${g.home_team} Hitters</div>
${g.home_hitters.map(h=>`
<div>
${h.name} ${tier(h.tier)}
${h.streak>=3?` <span class='hot'>🔥 ${h.streak}‑game streak</span>`:""}<br>
AVG ${h.stats.avg} | K% ${h.stats.k_rate} | BB% ${h.stats.bb_rate} | BIP/PA ${h.stats.bip_pa}<br>
RISP AVG ${h.risp.avg}
</div>
`).join("")}
</div>
`;
    c.appendChild(card);
  });
});
</script>

<footer style="margin-top:32px;font-size:12px;color:#555;">
<strong>Disclaimer</strong><br>
Informational only. No predictions, betting advice, or guarantees.
</footer>

</body>
</html>
